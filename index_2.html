<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>กิจกรรมลุ้นรางวัล</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg: #FBF6EC;
    --paper: #FFFFFF;
    --ink: #22303A;
    --ink-soft: #5B6B74;
    --gold: #C79A3C;
    --gold-deep: #9C7526;
    --maroon: #8C3B2E;
    --green: #3F7D5C;
    --line: #E7DEC9;
    --radius: 14px;
    font-family: "Noto Sans Thai", "Sarabun", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, #f3e9d0 0%, transparent 45%),
      var(--bg);
    color:var(--ink);
    padding-bottom:80px;
  }
  header{
    padding:28px 20px 16px;
    max-width:960px;
    margin:0 auto;
  }
  header h1{
    font-size:26px;
    margin:0 0 2px;
    letter-spacing:0.2px;
  }
  header p{
    margin:0;
    color:var(--ink-soft);
    font-size:14px;
  }
  .ticket-mark{
    display:inline-block;
    color:var(--gold-deep);
  }
  nav.tabs{
    max-width:960px;
    margin:18px auto 0;
    padding:0 20px;
    display:flex;
    gap:8px;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    appearance:none;
    border:none;
    background:none;
    font-family:inherit;
    font-size:14.5px;
    padding:10px 14px;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--maroon);
    border-bottom-color:var(--maroon);
    font-weight:600;
  }
  nav.tabs button .count{
    background:var(--line);
    color:var(--ink-soft);
    border-radius:20px;
    padding:1px 8px;
    font-size:12px;
    margin-left:6px;
  }
  main{
    max-width:960px;
    margin:0 auto;
    padding:20px;
  }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:14.5px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .card{
    background:var(--paper);
    border-radius:var(--radius);
    border:1px solid var(--line);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .card .thumb{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#f1ead9;
    display:block;
  }
  .card .thumb.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#c7bb9c;
    font-size:13px;
  }
  .card .body{
    padding:12px 14px 14px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex:1;
  }
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .badge{
    font-size:11.5px;
    padding:3px 9px;
    border-radius:20px;
    font-weight:600;
    letter-spacing:0.2px;
  }
  .badge.due-soon{background:#FBE1DA; color:var(--maroon);}
  .badge.due-normal{background:#EFE7D3; color:var(--gold-deep);}
  .badge.won{background:#E4F0E8; color:var(--green);}
  .badge.lost{background:#EDEDED; color:#7a7a7a;}
  .badge.pending-result{background:#FDF0D8; color:#8A6413;}
  .card .field{font-size:13px; color:var(--ink-soft);}
  .card .field b{color:var(--ink); font-weight:600;}
  .card a.link-btn{
    font-size:13px;
    color:var(--maroon);
    text-decoration:none;
    font-weight:600;
  }
  .card a.link-btn:hover{text-decoration:underline;}
  .actions{display:flex; gap:8px; margin-top:auto; padding-top:6px;}
  button.btn{
    font-family:inherit;
    border:none;
    border-radius:9px;
    padding:8px 12px;
    font-size:13px;
    cursor:pointer;
    font-weight:600;
    flex:1;
  }
  .btn.win{background:var(--green); color:white;}
  .btn.lose{background:#EDEDED; color:#555;}
  .btn.primary{background:var(--maroon); color:white;}
  .btn.ghost{background:none; border:1px solid var(--line); color:var(--ink-soft);}
  .fab{
    position:fixed;
    right:22px;
    bottom:26px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--maroon);
    color:white;
    font-size:28px;
    border:none;
    box-shadow:0 8px 20px rgba(140,59,46,0.35);
    cursor:pointer;
    line-height:0;
  }
  dialog{
    border:none;
    border-radius:var(--radius);
    padding:0;
    width:min(520px, 92vw);
    max-height:88vh;
    overflow:auto;
  }
  dialog::backdrop{background:rgba(34,48,58,0.45);}
  .dlg-inner{padding:22px;}
  .dlg-inner h2{margin:0 0 16px; font-size:19px;}
  label{
    display:block;
    font-size:13px;
    color:var(--ink-soft);
    margin:14px 0 5px;
    font-weight:600;
  }
  input[type=text], input[type=date], textarea, select{
    width:100%;
    font-family:inherit;
    font-size:14px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:9px;
    background:#FFFDF9;
    color:var(--ink);
  }
  textarea{resize:vertical; min-height:56px;}
  .link-row{display:flex; gap:8px;}
  .link-row input{flex:1;}
  .link-row button{white-space:nowrap;}
  .preview-box{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .preview-box img{width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line);}
  .paste-zone{
    border:1.5px dashed var(--line);
    border-radius:12px;
    padding:18px;
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    cursor:pointer;
    background:#FFFDF9;
    transition:border-color .15s, background .15s;
  }
  .paste-zone:hover, .paste-zone:focus{
    border-color:var(--gold);
    background:#FCF7EA;
    outline:none;
  }
  .paste-zone.has-image{padding:8px;}
  .paste-zone img{
    max-width:100%;
    max-height:220px;
    border-radius:8px;
    display:block;
    margin:0 auto;
  }
  .dlg-actions{display:flex; gap:10px; margin-top:22px;}
  .dlg-actions button{flex:1;}
  .status-note{font-size:12.5px; color:var(--ink-soft); margin-top:4px;}
  .radio-group{display:flex; gap:10px; margin-top:4px;}
  .radio-group label{
    display:flex; align-items:center; gap:6px;
    border:1px solid var(--line);
    border-radius:9px;
    padding:8px 12px;
    font-weight:500;
    font-size:13.5px;
    color:var(--ink);
    cursor:pointer;
    flex:1;
    justify-content:center;
    margin:0;
  }
  .radio-group input{width:auto;}
  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:var(--ink); color:white; padding:10px 18px; border-radius:30px;
    font-size:13.5px; opacity:0; pointer-events:none; transition:opacity .25s;
    z-index:50;
  }
  .toast.show{opacity:1;}
  .section-title{
    font-size:14px; font-weight:700; color:var(--ink-soft);
    margin:26px 0 12px; text-transform:uppercase; letter-spacing:0.4px;
  }
  .section-title:first-child{margin-top:0;}
</style>
</head>
<body>

<header>
  <h1><span class="ticket-mark">🎟</span> กิจกรรมลุ้นรางวัล</h1>
  <p>รวมกิจกรรมชิงโชค เก็บวันหมดเขต วันประกาศ และผลรางวัล ในที่เดียว</p>
</header>

<nav class="tabs">
  <button data-tab="active" class="active">รอผล <span class="count" id="count-active">0</span></button>
  <button data-tab="won">ได้รางวัล <span class="count" id="count-won">0</span></button>
  <button data-tab="lost">ไม่ได้/ประวัติ <span class="count" id="count-lost">0</span></button>
</nav>

<main id="main"></main>

<button class="fab" onclick="openAddDialog()" title="เพิ่มกิจกรรม">+</button>

<!-- Add / edit dialog -->
<dialog id="addDialog">
  <div class="dlg-inner">
    <h2>เพิ่มกิจกรรม</h2>

    <label>ลิงก์โพสต์</label>
    <input type="text" id="f-link" placeholder="วางลิงก์ Facebook ที่นี่" />

    <label>รูปภาพ</label>
    <div class="paste-zone" id="pasteZone" tabindex="0">
      <span id="pasteZoneText">คลิกตรงนี้แล้วกด Ctrl+V เพื่อวางรูปที่แคปมา<br>หรือคลิกเพื่อเลือกไฟล์</span>
      <img id="previewImg" style="display:none;" />
    </div>
    <input type="file" id="f-file" accept="image/*" style="display:none;" onchange="handleManualUpload(event)" />
    <div class="status-note" id="fetchStatus"></div>

    <label>วันหมดเขต</label>
    <input type="date" id="f-expire" />

    <label>วันประกาศผล</label>
    <input type="date" id="f-announce" />

    <label>ของที่ต้องซื้อ (ถ้ามี)</label>
    <input type="text" id="f-buy" placeholder="เช่น Pretz ที่ 7-Eleven" />

    <label>โน้ตเพิ่มเติม</label>
    <textarea id="f-note"></textarea>

    <div class="dlg-actions">
      <button class="btn ghost" onclick="closeAddDialog()">ยกเลิก</button>
      <button class="btn primary" onclick="saveActivity()">บันทึก</button>
    </div>
  </div>
</dialog>

<!-- Win result dialog -->
<dialog id="winDialog">
  <div class="dlg-inner">
    <h2>ยินดีด้วย 🎉 ได้อะไร?</h2>
    <label>ชื่อรางวัล</label>
    <input type="text" id="w-prize" placeholder="เช่น Gift Voucher Pizza Hut 300.-" />
    <label>ส่งบ้านใคร</label>
    <div class="radio-group">
      <label><input type="radio" name="sentTo" value="โบว์" checked /> โบว์</label>
      <label><input type="radio" name="sentTo" value="โจ้" /> โจ้</label>
    </div>
    <div class="dlg-actions">
      <button class="btn ghost" onclick="document.getElementById('winDialog').close()">ยกเลิก</button>
      <button class="btn primary" onclick="confirmWin()">บันทึก</button>
    </div>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
/* ============== CONFIG: กรอกค่าตรงนี้หลังสร้าง Supabase project ============== */
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-KEY";
/* ============================================================================= */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allActivities = [];
let currentTab = "active";
let pendingImageUrl = null;
let winTargetId = null;

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    render();
  });
});

async function loadActivities(){
  const { data, error } = await sb.from("activities").select("*").order("expire_date", { ascending: true });
  if (error){ showToast("โหลดข้อมูลไม่สำเร็จ: " + error.message); return; }
  allActivities = data || [];
  render();
}

function daysLeft(dateStr){
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function fmtDate(dateStr){
  if (!dateStr) return "-";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("th-TH", { year:"numeric", month:"short", day:"numeric" });
}

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  const active = allActivities.filter(a => a.status === "active");
  const wonPending = allActivities.filter(a => a.status === "won_pending");
  const received = allActivities.filter(a => a.status === "received");
  const lost = allActivities.filter(a => a.status === "lost");

  document.getElementById("count-active").textContent = active.length;
  document.getElementById("count-won").textContent = wonPending.length + received.length;
  document.getElementById("count-lost").textContent = lost.length;

  if (currentTab === "active"){
    renderGrid(main, active, "active");
  } else if (currentTab === "won"){
    if (wonPending.length){
      const t = document.createElement("div");
      t.className = "section-title";
      t.textContent = "รอส่งของ";
      main.appendChild(t);
      renderGrid(main, wonPending, "won_pending");
    }
    if (received.length){
      const t = document.createElement("div");
      t.className = "section-title";
      t.textContent = "ได้รับแล้ว";
      main.appendChild(t);
      renderGrid(main, received, "received");
    }
    if (!wonPending.length && !received.length){
      renderGrid(main, [], "won_pending");
    }
  } else if (currentTab === "lost"){
    renderGrid(main, lost, "lost");
  }
}

function renderGrid(container, items, kind){
  if (!items.length){
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = kind === "lost" ? "ยังไม่มีกิจกรรมที่พลาดรางวัล" :
      kind === "active" ? "ยังไม่มีกิจกรรมที่กำลังรอผล กด + เพื่อเพิ่ม" :
      "ยังไม่มีรายการ";
    container.appendChild(empty);
    return;
  }
  const grid = document.createElement("div");
  grid.className = "grid";
  items.forEach(a => grid.appendChild(renderCard(a, kind)));
  container.appendChild(grid);
}

function renderCard(a, kind){
  const card = document.createElement("div");
  card.className = "card";

  if (a.image_url){
    const img = document.createElement("img");
    img.className = "thumb";
    img.src = a.image_url;
    img.loading = "lazy";
    card.appendChild(img);
  } else {
    const ph = document.createElement("div");
    ph.className = "thumb placeholder";
    ph.textContent = "ไม่มีรูป";
    card.appendChild(ph);
  }

  const body = document.createElement("div");
  body.className = "body";

  const badgeRow = document.createElement("div");
  badgeRow.className = "badge-row";

  if (kind === "active"){
    const dl = daysLeft(a.expire_date);
    if (dl !== null){
      const b = document.createElement("span");
      b.className = "badge " + (dl <= 3 ? "due-soon" : "due-normal");
      b.textContent = dl < 0 ? "หมดเขตแล้ว" : dl === 0 ? "หมดเขตวันนี้" : `เหลือ ${dl} วัน`;
      badgeRow.appendChild(b);
    }
    const announceDl = daysLeft(a.announce_date);
    if (a.announce_date && announceDl !== null && announceDl <= 0){
      const b2 = document.createElement("span");
      b2.className = "badge pending-result";
      b2.textContent = "ถึงวันประกาศแล้ว";
      badgeRow.appendChild(b2);
    }
  } else if (kind === "won_pending" || kind === "received"){
    const b = document.createElement("span");
    b.className = "badge won";
    b.textContent = a.prize_name || "ได้รางวัล";
    badgeRow.appendChild(b);
  } else if (kind === "lost"){
    const b = document.createElement("span");
    b.className = "badge lost";
    b.textContent = "ไม่ได้รางวัล";
    badgeRow.appendChild(b);
  }
  body.appendChild(badgeRow);

  const f1 = document.createElement("div");
  f1.className = "field";
  f1.innerHTML = `<b>หมดเขต:</b> ${fmtDate(a.expire_date)}`;
  body.appendChild(f1);

  const f2 = document.createElement("div");
  f2.className = "field";
  f2.innerHTML = `<b>ประกาศผล:</b> ${fmtDate(a.announce_date)}`;
  body.appendChild(f2);

  if (a.what_to_buy){
    const f3 = document.createElement("div");
    f3.className = "field";
    f3.innerHTML = `<b>ต้องซื้อ:</b> ${escapeHtml(a.what_to_buy)}`;
    body.appendChild(f3);
  }

  if (kind === "won_pending" || kind === "received"){
    const f4 = document.createElement("div");
    f4.className = "field";
    f4.innerHTML = `<b>ส่งบ้าน:</b> ${escapeHtml(a.sent_to || "-")}`;
    body.appendChild(f4);
  }

  if (a.note){
    const f5 = document.createElement("div");
    f5.className = "field";
    f5.textContent = a.note;
    body.appendChild(f5);
  }

  const link = document.createElement("a");
  link.className = "link-btn";
  link.href = a.link;
  link.target = "_blank";
  link.rel = "noopener";
  link.textContent = "เปิดโพสต์ →";
  body.appendChild(link);

  const actions = document.createElement("div");
  actions.className = "actions";

  if (kind === "active"){
    const winBtn = document.createElement("button");
    winBtn.className = "btn win";
    winBtn.textContent = "ได้รางวัล";
    winBtn.onclick = () => openWinDialog(a.id);
    const loseBtn = document.createElement("button");
    loseBtn.className = "btn lose";
    loseBtn.textContent = "ไม่ได้";
    loseBtn.onclick = () => markLost(a.id);
    actions.appendChild(winBtn);
    actions.appendChild(loseBtn);
  } else if (kind === "won_pending"){
    const recvBtn = document.createElement("button");
    recvBtn.className = "btn primary";
    recvBtn.textContent = "ได้รับของแล้ว";
    recvBtn.onclick = () => markReceived(a.id);
    actions.appendChild(recvBtn);
  } else if (kind === "lost"){
    const restoreBtn = document.createElement("button");
    restoreBtn.className = "btn ghost";
    restoreBtn.textContent = "กู้คืนกลับหน้ารอผล";
    restoreBtn.onclick = () => restoreActive(a.id);
    actions.appendChild(restoreBtn);
  }

  if (actions.children.length){
    body.appendChild(actions);
  }

  card.appendChild(body);
  return card;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}

/* ---------- Add dialog ---------- */
function openAddDialog(){
  document.getElementById("f-link").value = "";
  document.getElementById("f-expire").value = "";
  document.getElementById("f-announce").value = "";
  document.getElementById("f-buy").value = "";
  document.getElementById("f-note").value = "";
  document.getElementById("f-file").value = "";
  document.getElementById("fetchStatus").textContent = "";
  resetPasteZone();
  pendingImageUrl = null;
  document.getElementById("addDialog").showModal();
}
function closeAddDialog(){
  document.getElementById("addDialog").close();
}

function resetPasteZone(){
  const zone = document.getElementById("pasteZone");
  zone.classList.remove("has-image");
  document.getElementById("pasteZoneText").style.display = "block";
  const img = document.getElementById("previewImg");
  img.style.display = "none";
  img.src = "";
}

const pasteZone = document.getElementById("pasteZone");
pasteZone.addEventListener("click", () => document.getElementById("f-file").click());
pasteZone.addEventListener("paste", handlePasteEvent);
// also listen at document level while the dialog is open, so the user
// doesn't have to click the zone first before pressing Ctrl+V
document.addEventListener("paste", (e) => {
  if (document.getElementById("addDialog").open) handlePasteEvent(e);
});

async function handlePasteEvent(e){
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items){
    if (item.type && item.type.startsWith("image/")){
      const file = item.getAsFile();
      if (file) await uploadImageFile(file);
      e.preventDefault();
      return;
    }
  }
}

async function handleManualUpload(e){
  const file = e.target.files[0];
  if (file) await uploadImageFile(file);
}

async function uploadImageFile(file){
  const statusEl = document.getElementById("fetchStatus");
  statusEl.textContent = "กำลังอัปโหลดรูป...";
  const ext = (file.type && file.type.split("/")[1]) || "png";
  const fileName = crypto.randomUUID() + "." + ext;
  const { error } = await sb.storage.from("activity-images").upload(fileName, file, { contentType: file.type || "image/png" });
  if (error){
    statusEl.textContent = "อัปโหลดไม่สำเร็จ: " + error.message;
    return;
  }
  const { data } = sb.storage.from("activity-images").getPublicUrl(fileName);
  pendingImageUrl = data.publicUrl;
  showPreview(data.publicUrl);
  statusEl.textContent = "อัปโหลดรูปแล้ว ✓";
}

function showPreview(url){
  const zone = document.getElementById("pasteZone");
  zone.classList.add("has-image");
  document.getElementById("pasteZoneText").style.display = "none";
  const img = document.getElementById("previewImg");
  img.style.display = "block";
  img.src = url;
}

async function saveActivity(){
  const link = document.getElementById("f-link").value.trim();
  if (!link){ showToast("ใส่ลิงก์ก่อนครับ"); return; }
  const payload = {
    link,
    image_url: pendingImageUrl,
    expire_date: document.getElementById("f-expire").value || null,
    announce_date: document.getElementById("f-announce").value || null,
    what_to_buy: document.getElementById("f-buy").value.trim() || null,
    note: document.getElementById("f-note").value.trim() || null,
    status: "active"
  };
  const { error } = await sb.from("activities").insert(payload);
  if (error){ showToast("บันทึกไม่สำเร็จ: " + error.message); return; }
  closeAddDialog();
  showToast("เพิ่มกิจกรรมแล้ว");
  loadActivities();
}

/* ---------- Result actions ---------- */
async function markLost(id){
  const { error } = await sb.from("activities").update({ status: "lost" }).eq("id", id);
  if (error){ showToast("ทำรายการไม่สำเร็จ: " + error.message); return; }
  showToast("ย้ายไปประวัติแล้ว");
  loadActivities();
}

function openWinDialog(id){
  winTargetId = id;
  document.getElementById("w-prize").value = "";
  document.getElementById("winDialog").showModal();
}

async function confirmWin(){
  const prize = document.getElementById("w-prize").value.trim();
  const sentTo = document.querySelector('input[name="sentTo"]:checked').value;
  const { error } = await sb.from("activities").update({
    status: "won_pending",
    prize_name: prize || null,
    sent_to: sentTo
  }).eq("id", winTargetId);
  if (error){ showToast("บันทึกไม่สำเร็จ: " + error.message); return; }
  document.getElementById("winDialog").close();
  showToast("ยินดีด้วย! บันทึกแล้ว 🎉");
  loadActivities();
}

async function markReceived(id){
  const { error } = await sb.from("activities").update({ status: "received" }).eq("id", id);
  if (error){ showToast("ทำรายการไม่สำเร็จ: " + error.message); return; }
  showToast("ย้ายไปกิจกรรมที่ได้รางวัลแล้ว");
  loadActivities();
}

async function restoreActive(id){
  const { error } = await sb.from("activities").update({ status: "active" }).eq("id", id);
  if (error){ showToast("ทำรายการไม่สำเร็จ: " + error.message); return; }
  showToast("กู้คืนกลับหน้ารอผลแล้ว");
  loadActivities();
}

/* ---------- Utility ---------- */
let toastTimer;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

loadActivities();
</script>
</body>
</html>
